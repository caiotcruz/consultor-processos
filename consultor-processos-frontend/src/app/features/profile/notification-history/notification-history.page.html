<ion-header class="ion-no-border smooth-header">
  <ion-toolbar>
    <ion-back-button defaultHref="/profile" slot="start" class="back-btn" text="">
      <ion-icon name="chevron-back-outline"></ion-icon>
    </ion-back-button>
    <ion-title>Histórico de Alertas</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="history-page">
  <ion-refresher slot="fixed" (ionRefresh)="resetAndLoad($event)" class="smooth-refresher">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div class="history-container">
    
    <app-loading-spinner *ngIf="isLoading()"></app-loading-spinner>

    <app-empty-state
      *ngIf="!isLoading() && items().length === 0"
      icon="notifications-off-outline"
      title="Sem notificações"
      message="Seus alertas automáticos de movimentações processuais aparecerão organizados aqui.">
    </app-empty-state>

    <div class="notification-list" *ngIf="!isLoading() && items().length > 0">
      
      <div *ngFor="let n of items()" class="notification-card" [attr.data-status]="n.status">
        
        <div class="card-side-badge">
          <ion-icon [name]="getChannelIcon(n.channel)"></ion-icon>
        </div>

        <div class="card-body">
          <div class="card-meta">
            <span class="timestamp">{{ n.sentAt | date:'dd/MM/yyyy HH:mm' }}</span>
            <div class="status-badge" [attr.data-status]="n.status">
              {{ statusLabel(n.status) }}
            </div>
          </div>

          <div class="card-content">
            <span class="notification-type">Movimentação Detectada</span>
            <p class="process-number" *ngIf="n.processNumber">
              Processo: <span class="number-highlight">{{ n.processNumber }}</span>
            </p>
          </div>
        </div>

      </div>

    </div>

    <ion-infinite-scroll [disabled]="!hasMore" (ionInfinite)="loadMore($event)" class="smooth-infinite">
      <ion-infinite-scroll-content loadingText="Buscando mais registros...">
      </ion-infinite-scroll-content>
    </ion-infinite-scroll>

  </div>
</ion-content>
