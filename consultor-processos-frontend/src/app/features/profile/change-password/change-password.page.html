<ion-header class="ion-no-border smooth-header">
  <ion-toolbar>
    <ion-back-button defaultHref="/profile" slot="start" class="back-btn" text="">
      <ion-icon name="chevron-back-outline"></ion-icon>
    </ion-back-button>
    <ion-title>Trocar Senha</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="change-password-page">
  <div class="page-wrapper">
    <div class="form-container animate-fade">
      
      <div class="title-section">
        <p class="instruction">Por motivos de segurança, altere sua senha regularmente.</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="smooth-form">

        <div class="input-group" [class.has-error]="current?.invalid && current?.touched">
          <ion-item lines="none" class="smooth-input">
            <ion-icon name="lock-closed-outline" slot="start" class="input-icon"></ion-icon>
            <ion-input 
              label="Senha atual" 
              labelPlacement="floating"
              [type]="show.current ? 'text' : 'password'"
              formControlName="currentPassword" 
              placeholder="••••••••"
              autocomplete="current-password">
            </ion-input>
            <ion-icon 
              slot="end" 
              [name]="show.current ? 'eye-off' : 'eye'"
              (click)="show.current = !show.current" 
              class="toggle-password-icon">
            </ion-icon>
          </ion-item>
          <div class="error-container" *ngIf="current?.invalid && current?.touched">
            <ion-text color="danger">
              <small>Por favor, informe sua senha atual.</small>
            </ion-text>
          </div>
        </div>

        <div class="input-group" [class.has-error]="newPwd?.invalid && newPwd?.touched">
          <ion-item lines="none" class="smooth-input">
            <ion-icon name="lock-closed-outline" slot="start" class="input-icon"></ion-icon>
            <ion-input 
              label="Nova senha" 
              labelPlacement="floating"
              [type]="show.new ? 'text' : 'password'"
              formControlName="newPassword" 
              placeholder="Mínimo 8 caracteres com 1 número"
              autocomplete="new-password">
            </ion-input>
            <ion-icon 
              slot="end" 
              [name]="show.new ? 'eye-off' : 'eye'"
              (click)="show.new = !show.new" 
              class="toggle-password-icon">
            </ion-icon>
          </ion-item>
          <div class="error-container" *ngIf="newPwd?.invalid && newPwd?.touched">
            <ion-text color="danger">
              <small>A senha deve ter no mínimo 8 caracteres e conter pelo menos 1 número.</small>
            </ion-text>
          </div>
        </div>

        <div class="input-group" [class.has-error]="form.errors?.['mismatch'] && confirmPwd?.touched">
          <ion-item lines="none" class="smooth-input">
            <ion-icon name="lock-closed-outline" slot="start" class="input-icon"></ion-icon>
            <ion-input 
              label="Confirmar nova senha" 
              labelPlacement="floating"
              [type]="show.confirm ? 'text' : 'password'"
              formControlName="confirmPassword" 
              placeholder="Repita a nova senha"
              autocomplete="new-password">
            </ion-input>
            <ion-icon 
              slot="end" 
              [name]="show.confirm ? 'eye-off' : 'eye'"
              (click)="show.confirm = !show.confirm" 
              class="toggle-password-icon">
            </ion-icon>
          </ion-item>
          <div class="error-container" *ngIf="form.errors?.['mismatch'] && confirmPwd?.touched">
            <ion-text color="danger">
              <small>As senhas digitadas não conferem.</small>
            </ion-text>
          </div>
        </div>

        <div class="banner-error" *ngIf="errorMessage">
          <p>{{ errorMessage }}</p>
        </div>

        <div class="action-buttons">
          <button 
            type="submit"
            [disabled]="form.invalid || isLoading" 
            class="smooth-button">
            <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
            <span *ngIf="!isLoading">Confirmar Nova Senha</span>
          </button>

          <button type="button" routerLink="/profile" class="smooth-button clear-btn">
            Cancelar
          </button>
        </div>

      </form>
    </div>
  </div>
</ion-content>
