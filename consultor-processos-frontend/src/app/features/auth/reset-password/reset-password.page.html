<ion-content class="auth-page">
  <div class="auth-wrapper">
    <div class="auth-container">

      <div *ngIf="!tokenFound()" class="error-state animate-fade">
        <div class="error-icon-wrapper">
          <ion-icon name="alert-circle-outline" class="error-icon"></ion-icon>
        </div>
        <h2>Link inválido</h2>
        <p class="description">Este endereço de redefinição de senha não é válido ou já foi utilizado anteriormente.</p>
        
        <button routerLink="/forgot-password" class="smooth-button full-width">
          Solicitar Nova Redefinição
        </button>
      </div>

      <form *ngIf="tokenFound()" [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form animate-fade">
        
        <div class="title-section">
          <h1>Nova Senha</h1>
          <p class="instruction">Digite e confirme sua nova credencial de acesso.</p>
        </div>

        <div class="input-group" [class.has-error]="newPassword?.invalid && newPassword?.touched">
          <ion-item lines="none" class="smooth-input">
            <ion-icon name="lock-closed-outline" slot="start" class="input-icon"></ion-icon>
            <ion-input
              label="Nova senha"
              labelPlacement="floating"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="newPassword"
              placeholder="Mínimo 8 caracteres com 1 número"
              autocomplete="new-password">
            </ion-input>
            <ion-icon
              slot="end"
              [name]="showPassword ? 'eye-off' : 'eye'"
              (click)="showPassword = !showPassword"
              class="toggle-password-icon">
            </ion-icon>
          </ion-item>
          <div class="error-container" *ngIf="newPassword?.invalid && newPassword?.touched">
            <ion-text color="danger">
              <small>A senha deve ter no mínimo 8 caracteres e pelo menos 1 número.</small>
            </ion-text>
          </div>
        </div>

        <div class="input-group" [class.has-error]="form.errors?.['mismatch'] && confirmPassword?.touched">
          <ion-item lines="none" class="smooth-input">
            <ion-icon name="lock-closed-outline" slot="start" class="input-icon"></ion-icon>
            <ion-input
              label="Confirmar nova senha"
              labelPlacement="floating"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="confirmPassword"
              placeholder="Repita a senha"
              autocomplete="new-password">
            </ion-input>
          </ion-item>
          <div class="error-container" *ngIf="form.errors?.['mismatch'] && confirmPassword?.touched">
            <ion-text color="danger">
              <small>As senhas digitadas não conferem.</small>
            </ion-text>
          </div>
        </div>

        <div class="banner-error" *ngIf="errorMessage">
          <p>{{ errorMessage }}</p>
        </div>

        <button
          type="submit"
          [disabled]="form.invalid || isLoading"
          class="smooth-button">
          <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
          <span *ngIf="!isLoading">Redefinir Senha</span>
        </button>

        <button type="button" routerLink="/login" class="smooth-button clear-btn">
          Cancelar e Voltar
        </button>

      </form>
    </div>
  </div>
</ion-content>
