spring:
  application:
    name: consultor-processos

  datasource:
    url:      jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:consultorprocessos_dev}
    username: ${DB_USER:dev}
    password: ${DB_PASSWORD:dev}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size:  10
      minimum-idle:        2
      connection-timeout:  30000
      idle-timeout:       600000
      max-lifetime:      1800000
      pool-name:         CP-HikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql:    false
    properties:
      hibernate:
        dialect:              org.hibernate.dialect.PostgreSQLDialect
        format_sql:           false
        default_schema:       public
        jdbc:
          time_zone:          UTC

  flyway:
    enabled:              true
    baseline-on-migrate:  false
    locations:            classpath:db/migration
    table:                flyway_schema_history
    validate-on-migrate:  true
    out-of-order:         false

  data:
    redis:
      host:     ${REDIS_HOST:localhost}
      port:     ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout:  2000ms
      lettuce:
        pool:
          max-active:  8
          max-idle:    8
          min-idle:    2
          max-wait:    1000ms

  rabbitmq:
    host:         ${RABBITMQ_HOST:localhost}
    port:         ${RABBITMQ_PORT:5672}
    username:     ${RABBITMQ_USER:dev}
    password:     ${RABBITMQ_PASSWORD:dev}
    virtual-host: /
    listener:
      simple:
        concurrency:     ${CRAWLER_WORKERS_MIN:3}
        max-concurrency: ${CRAWLER_WORKERS_MAX:10}
        prefetch:        1
        retry:
          enabled: false  

  jackson:
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans:       false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: NON_NULL
    time-zone: UTC

  mail:
    host:     ${SMTP_HOST:localhost}
    port:     ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth:            true
          starttls:
            enable:        true
            required:      true
          connectiontimeout: 5000
          timeout:           5000
          writetimeout:      5000

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: never   
  prometheus:
    metrics:
      export:
          enabled: true

app:
  scheduler:
    enabled: true      
    cron:    "0 */1 * * * *"
    lock-ttl-seconds: 50

  notifications:
    email:
      enabled:             false
      rate-limit-per-hour: 10
    push:
      enabled:             false
    unsubscribe-base-url:  ${APP_BASE_URL:http://localhost:4200}/unsubscribe
    unsubscribe-secret:    ${UNSUBSCRIBE_SECRET:dev-secret-never-use-in-prod}

  courts:
    stf:
      base-url: ${STF_BASE_URL:https://portal.stf.jus.br}
    eproc:
      base-url: ${EPROC_BASE_URL:https://eproc1g-cp.tjrj.jus.br}
    stjrj:
      base-url: ${STJRJ_BASE_URL:https://www3.tjrj.jus.br}
  
  jwt:
    private-key: ${JWT_PRIVATE_KEY:}   
    public-key:  ${JWT_PUBLIC_KEY:}
    access-token-expiry-minutes: 15
    refresh-token-expiry-days:   7
  
  email:
    sender-address: ${EMAIL_SENDER_ADDRESS:noreply@consultorprocessos.com.br}
    sender-name:    ${EMAIL_SENDER_NAME:Consultor de Processos}


firebase:
  project-id:       ${FIREBASE_PROJECT_ID:}
  credentials-json: ${FIREBASE_CREDENTIALS_JSON:}

server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message:    never
    include-stacktrace: never
    include-binding-errors: never